<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaserBeamEdits</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(270deg, #02050a, #0a1f3a, #02101f);
  background-size: 400% 400%;
  animation: bgMove 15s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* BACKGROUND ANIMATION */
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* MAIN BOX */
.container {
  width: 90%;
  max-width: 1000px;
  padding: 40px;
  border-radius: 25px;
  background: rgba(10, 25, 50, 0.6);
  backdrop-filter: blur(20px);
  position: relative;
  animation: fadeIn 1s ease;
}

/* GLOWING BORDER */
.container::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 25px;
  padding: 2px;
  background: linear-gradient(270deg, #00f7ff, #007bff, #00f7ff);
  background-size: 400%;
  animation: borderMove 6s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

@keyframes borderMove {
  0% { background-position: 0%; }
  100% { background-position: 400%; }
}

/* TITLE */
h1 {
  text-align: center;
  font-size: 3rem;
  background: linear-gradient(90deg, #00f7ff, #00aaff);
  -webkit-background-clip: text;
  color: transparent;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
  from { text-shadow: 0 0 10px #00eaff; }
  to { text-shadow: 0 0 25px #00f7ff, 0 0 40px #007bff; }
}

/* DESCRIPTION */
.desc {
  text-align: center;
  margin-top: 15px;
  color: #cdefff;
  line-height: 1.6;
}

/* SECTION TITLE */
h2 {
  margin-top: 40px;
  margin-bottom: 20px;
  color: #00eaff;
  border-bottom: 1px solid rgba(0,255,255,0.2);
  padding-bottom: 10px;
}

/* VIDEOS */
.videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

iframe {
  width: 100%;
  height: 400px;
  border-radius: 15px;
  border: none;
  transition: 0.4s;
  box-shadow: 0 0 10px rgba(0,255,255,0.2);
}

iframe:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(0,255,255,0.6);
}

/* BUTTON */
.button {
  display: block;
  margin: 40px auto 0;
  padding: 12px 25px;
  background: linear-gradient(90deg, #00f7ff, #00aaff);
  border-radius: 30px;
  color: black;
  text-decoration: none;
  font-weight: bold;
  width: fit-content;
  transition: 0.3s;
}

.button:hover {
  box-shadow: 0 0 20px #00f7ff;
  transform: scale(1.05);
}

/* FADE IN */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
  <h1>Fae1</h1>

  <p class="desc">
    I create high-impact short-form edits and engaging long-form videos — from fast-paced gaming content to smooth, polished storytelling.
    Turning raw clips into content that captures attention and keeps viewers watching.
  </p>

  <h2>SHOWCASE</h2>

  <div class="videos">
    <iframe src="https://www.youtube.com/embed/AA5UPQoUN3Y"></iframe>
    <iframe src="https://www.youtube.com/embed/5604RP3bQWI"></iframe>
    <iframe src="https://www.youtube.com/embed/d6CJXejZRow"></iframe>
    <iframe src="https://www.youtube.com/embed/C-K4ROctDAU"></iframe>
  </div>

  <a href="#" class="button">Contact Me</a>
</div>

</body>
</html>
